<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
       layout:decorate="~{layout/layout}">
<head>
<meta charset="UTF-8">
<title>slipList</title>
<style>
	.back {background-color: Lightskyblue;}
	.bold {font-weight: bold;}
	.red {color: red;}
</style>
</head>
<body>
<div layout:fragment="content">
<h2>Slip List</h2>
<table>
	<tr>
		<td>전표번호</td>
		<td>금액</td>
		<td>발생일</td>
		<td>정산일</td>
		<td>고객명</td>
		<td>계좌번호</td>
	</tr>
	<tr th:each="slip : ${list}" th:class="${slipStat.even} ? back : _">
    	<td th:text="${slip.slipNo}"></td>
    	<td th:text="${#numbers.formatInteger (slip.slipAmount, 3, 'COMMA')}"
    	class="bold" th:classappend="${slip.slipAmount>10000} ? 'red' : _"></td>
    	<td th:text="${slip.slipDt}"></td>
    	<td th:text="${slip.salDt}"></td>
    	<td th:text="${slip.customer}"></td>
    	<td th:text="${slip.bankAcct}"></td>
  	</tr>
</table>

<!--/* <a th:href="@{/slip/insert}">등록</a> */-->
</div>
</body>
</html>
