<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>post.html</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-lg">
      <div class="row">
        <div class="col border">
          <table class="table table-primary table-striped">
            <thead>
              <tr>
                <td>번호</td>
                <td>제목</td>
                <td>작성자</td>
              </tr>
            </thead>
            <tbody id="postList"></tbody>
          </table>
        </div>

        <div class="col border">
          <div class="mb-3">
            <label for="postId" class="form-label">post id</label>
            <input type="text" class="form-control" id="postId" />
          </div>
          <div class="mb-3">
            <label for="postTitle" class="form-label">post title</label>
            <input type="text" class="form-control" id="postTitle" />
          </div>
          <div class="mb-3">
            <label for="userId" class="form-label">user id</label>
            <input type="text" class="form-control" id="userId" />
          </div>
          <div class="mb-3">
            <label for="postBody" class="form-label">post body</label>
            <textarea class="form-control" id="postBody" rows="3"></textarea>
          </div>
          <div>
            <button type="button" id="btnUpdate" class="btn btn-success">
              수정
            </button>
            <button type="button" id="btnDelete" class="btn btn-danger">
              삭제
            </button>
          </div>
        </div>
      </div>

      <div>
        <table class="table table-secondary table-striped">
          <tbody id="commentList"></tbody>
        </table>
      </div>
    </div>

    <script>
      selectAll();

      document.querySelector("#postList").addEventListener("click", (e) => {
        let id = e.target.closest("tr").dataset.id;
        commentAll(id);
        selectOne(id);
      });

      ////// 수정버튼 이벤트
      document.querySelector("#btnUpdate").addEventListener("click", (e) => {
        let idLabel = document.querySelector("#postId");
        let titleLabel = document.querySelector("#postTitle");
        let bodyLabel = document.querySelector("#postBody");
        let userIdLabel = document.querySelector("#userId");

        let id = idLabel.value;
        let title = titleLabel.value;
        let body = bodyLabel.value;
        let userId = userIdLabel.value;

        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            id,
            title,
            body,
            userId,
          }),
          headers: {
            "Content-type": "application/json; charset=UTF-8",
          },
        })
          .then((response) => response.json())
          .then((json) => {
            alert("수정완료");
            selectAll();
          });
      });

      ///// 삭제버튼 이벤트
      document.querySelector("#btnDelete").addEventListener("click", (e) => {
        let id = document.querySelector("#postId").value;
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
          method: "DELETE",
        }).then((resp) => {
          alert("삭제완료");
          selectAll();
        });
      });

      ////// 단건 조회
      function selectOne(id) {
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`)
          .then((response) => response.json())
          .then((post) => {
            // id값은 변수로 바로 가지고 올 수 있다.
            postId.value = post.id;
            postTitle.value = post.title;
            userId.value = post.userId;
            postBody.value = post.body;
          });
      }

      ////// 댓글조회
      function commentAll(id) {
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}/comments`)
          .then((response) => response.json())
          .then((json) => {
            commentList.innerHTML = "";
            json.forEach((data) => {
              let tag = `
                <tr>
                  <td>${data.postId}</td>
                  <td>${data.id}</td>
                  <td>${data.name}</td>
                  <td>${data.email}</td>
                  <td>${data.body}/td>
                </tr>
              `;
              commentList.insertAdjacentHTML("beforeend", tag);
            });
          });
      }

      ////// 전체조회
      function selectAll() {
        fetch("https://jsonplaceholder.typicode.com/posts")
          .then((response) => response.json())
          .then((post) => {
            postList.innerHTML = "";
            for (let i = 0; i < 10; i++) {
              let tag = `
                <tr data-id = ${post[i].id}>
                  <td>${post[i].id}</td>
                  <td>${post[i].title}</td>
                  <td>${post[i].userId}</td>
                </tr>
                `;
              // document.querySelector("#postList")
              postList.insertAdjacentHTML("beforeend", tag);
            }
          });
      }
    </script>
  </body>
</html>
