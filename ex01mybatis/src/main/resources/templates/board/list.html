<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
       layout:decorate="~{layout/layoutBoard}">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Insert title here</title>
  </head>
  <body>
  <div layout:fragment="boardlayout">
    <div class="container">
      <header>
        <h1 class="text-center">게시판</h1>
      </header>
      <form th:object="${bd}" name="frm">
		<input type="hidden" name="pageNum" value="1">
	
		<div>
		<label for="title" class="form-label">책 제목</label>
		<input th:field = "*{title}"> 
		</div>
	
		<div>
		<label for="content" class="form-label">내용</label>
		<input th:field = "*{content}">
		</div>
	
		<button type="button" onclick="init()">초기화</button>
		<button>조회</button>
	  </form>
	  
      <main class="card">
        <div class="card-header">
          <div class=" row justify-content-between">
            <div class="col-4 text-start">Board List Page</div>
            <div class="col-4 text-end">
              <button type="button" id="btnRegister" class="btn btn-success">
                게시글등록
              </button>
            </div>
          </div>
        </div>
        <div class="card-body">
          <table class="table table-striped table-hover">
            <thead>
              <tr class="table-success">
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일자</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="board : ${pageInfo.list}">
                <td th:text="${board.bno}">1</td>
                <td
                  th:text="${board.title}"
                  th:onclick="|location.href='info?bno=${board.bno}'|"
                >
                  제목
                </td>
                <td th:text="${board.writer}">홍길동</td>
                <td th:text="${#dates.format(board.regdate,'yyyy-MM-dd')}">
                  2025/01/06
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
      
      <div th:insert="~{layout/paging::page(${pageInfo})}">
      </div>
    </div>

    <script th:inline="javascript">
    
   	  /* const result = [[${result}]];
        if( result ) {
      	  alert("등록완료");
        } 
       */
       
      function gopage(pageNum){
   		frm.pageNum.value = pageNum;
   		frm.submit();
   	  }
       
      const btnRegister = document.querySelector("#btnRegister");
      btnRegister.addEventListener("click", ()=>{
      	location.href="register";
      })
      
      function init() {
    	  /* title.value = "";
    	  content.value = ""; */
    	  location.href = "list";
	  }
    </script>
    </div>
  </body>
</html>
