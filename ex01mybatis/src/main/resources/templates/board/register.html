<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layoutBoard}">
<head>
<meta charset="UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous" />
<title>등록</title>
</head>
<body>
	<div layout:fragment="boardlayout">
		<div class="container">
			<header>
				<h1 class="text-center">게시판</h1>
			</header>
			<main class="card">
				<div class="card-header">
					<div class=" row justify-content-between">
						<div class="col-4 text-start">Board Register</div>
						<div class="col-4 text-end"></div>
					</div>
				</div>
				<div class="card-body">
					<h3 th:text="${bd.bno == null ? '글 등록' : '글 수정'}"></h3>
					
					<form th:object="${bd}" action="register" method="post" enctype="multipart/form-data">
						<div class="mb-3">
							<label for="bno" class="form-label">글번호</label> <input
								type="text" th:value="*{bno}" class="form-control" name="bno" readonly />
						</div>
						<div class="mb-3">
							<label for="title" class="form-label">제목</label> <input
								type="text" th:value="*{title}" class="form-control" name="title" placeholder="제목입력" />
						</div>
						<div class="mb-3">
							<label for="content" class="form-label">내용</label>
							<textarea th:text="*{content}" class="form-control" name="content" rows="3"></textarea>
						</div>
						<div class="mb-3">
							<label for="writer" class="form-label">작성자</label> <input
								type="text" th:value="*{writer}" class="form-control" name="writer" />
						</div>
						<div class="mb-3">
							<label for="file" class="form-label">첨부파일</label> <input
								type="file" class="form-control" name="file" />
						</div>
						<div class="d-grid justify-content-md-end">
							<button th:if="*{bno == null}" formaction="register" class="btn btn-success">등록</button>
							<button th:unless="*{bno == null}"  formaction="update" class="btn btn-secondary">수정</button>
						</div>
					</form>
				</div>
			</main>
		</div>
	</div>
</body>
</html>
